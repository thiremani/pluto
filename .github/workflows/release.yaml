name: Pluto Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-release:
    name: Validate tagged commit
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      # Following the instruction on https://tinygo.org/docs/guides/build/bring-your-own-llvm/
      - name: Install LLVM and dependencies
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install -y llvm-22-dev lld-22 clang-22

      - name: Set LLVM environment
        env:
          LLVM_BIN: /usr/lib/llvm-22/bin
          LLVM_CONFIG: /usr/lib/llvm-22/bin/llvm-config
        run: |
          python3 scripts/llvm_env.py --github-actions

      - name: Smoke test
        run: |
          go test -race ./lexer ./parser ./compiler

  create-release:
    name: Ensure draft release exists
    runs-on: ubuntu-24.04
    needs: validate-release
    steps:
      - name: Create draft release if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release for $TAG already exists."
          else
            gh release create "$TAG" --draft --title "$TAG" --notes ""
          fi

  release-macos-arm64:
    name: Release (macOS arm64)
    runs-on: macos-14
    needs: create-release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install LLVM
        run: |
          brew update
          brew install llvm lld
          LLVM_PREFIX="$(brew --prefix llvm)"
          LLVM_BIN="$LLVM_PREFIX/bin" \
            LLVM_CONFIG="$LLVM_PREFIX/bin/llvm-config" \
            python3 scripts/llvm_env.py --github-actions

      - name: Release artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          go run github.com/goreleaser/goreleaser/v2@v2.13.3 release --clean --skip=announce,homebrew,scoop,winget,chocolatey,nfpm

  release-macos-amd64:
    name: Release (macOS x86_64)
    runs-on: macos-13
    needs: create-release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install LLVM
        run: |
          brew update
          brew install llvm lld
          LLVM_PREFIX="$(brew --prefix llvm)"
          LLVM_BIN="$LLVM_PREFIX/bin" \
            LLVM_CONFIG="$LLVM_PREFIX/bin/llvm-config" \
            python3 scripts/llvm_env.py --github-actions

      - name: Release artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          go run github.com/goreleaser/goreleaser/v2@v2.13.3 release --clean --skip=announce,homebrew,scoop,winget,chocolatey,nfpm

  release-windows:
    name: Release (Windows)
    runs-on: windows-2022
    needs: create-release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up MSYS2 UCRT64
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-go
            mingw-w64-ucrt-x86_64-llvm
            mingw-w64-ucrt-x86_64-clang
            mingw-w64-ucrt-x86_64-lld
            mingw-w64-ucrt-x86_64-python

      - name: Release artifacts
        shell: msys2 {0}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          eval "$(python scripts/llvm_env.py --shell)"
          go version
          go run github.com/goreleaser/goreleaser/v2@v2.13.3 release --clean --skip=announce,homebrew,scoop,winget,chocolatey,nfpm

  release-linux:
    name: Release (Linux)
    runs-on: ubuntu-24.04
    needs: create-release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      # Following the instruction on https://tinygo.org/docs/guides/build/bring-your-own-llvm/
      - name: Install LLVM and dependencies
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install -y llvm-22-dev lld-22 clang-22

      - name: Set LLVM environment
        env:
          LLVM_BIN: /usr/lib/llvm-22/bin
          LLVM_CONFIG: /usr/lib/llvm-22/bin/llvm-config
        run: |
          python3 scripts/llvm_env.py --github-actions

      - name: Release artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          go run github.com/goreleaser/goreleaser/v2@v2.13.3 release --clean --skip=announce,homebrew,scoop,winget,chocolatey

  release-linux-arm64:
    name: Release (Linux arm64)
    runs-on: ubuntu-24.04-arm
    needs: create-release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      # Following the instruction on https://tinygo.org/docs/guides/build/bring-your-own-llvm/
      - name: Install LLVM and dependencies
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install -y llvm-22-dev lld-22 clang-22

      - name: Set LLVM environment
        env:
          LLVM_BIN: /usr/lib/llvm-22/bin
          LLVM_CONFIG: /usr/lib/llvm-22/bin/llvm-config
        run: |
          python3 scripts/llvm_env.py --github-actions

      - name: Release artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          go run github.com/goreleaser/goreleaser/v2@v2.13.3 release --clean --skip=announce,homebrew,scoop,winget,chocolatey
